apiVersion: apps/v1
kind: Deployment
metadata:
  name: agronet-api
  labels:
    app: agronet
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agronet
  template:
    metadata:
      labels:
        app: agronet
    spec:
      containers:
      - name: api-container
        image: agronet-ingestion:v1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "300m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: agronet-service
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8000
  selector:
    app: agronet
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agronet-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agronet-api
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50
