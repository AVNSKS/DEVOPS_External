apiVersion: apps/v1
kind: Deployment
metadata:
  name: agronet-api
  labels:
    app: agronet
  namespace: jenkins
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: agronet
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: agronet
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: agronet
      containers:
      - name: api-container
        image: sivaanumula/agronet-ingestion:v1
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        readinessProbe:
          httpGet:
            path: /readyz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 15
          periodSeconds: 20
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "300m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: agronet-service
  namespace: jenkins
  labels:
    app: agronet
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8000
    name: http
  selector:
    app: agronet
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agronet-hpa
  namespace: jenkins
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agronet-api
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: agronet-pdb
  namespace: jenkins
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: agronet
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agronet-allow-web-and-monitoring
  namespace: jenkins
spec:
  podSelector:
    matchLabels:
      app: agronet
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 8000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agronet-ingress
  namespace: jenkins
spec:
  ingressClassName: traefik
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: agronet-service
            port:
              number: 80
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: agronet-api
  namespace: jenkins
  labels:
    release: kube-stack-prometheus
spec:
  selector:
    matchLabels:
      app: agronet
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
