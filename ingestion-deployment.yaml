apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion-api-deployment
  labels:
    app: agronet-ingestion
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agronet-ingestion
  template:
    metadata:
      labels:
        app: agronet-ingestion
    spec:
      containers:
      - name: ingestion-api
        image: sivaanumula/ingestion-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        # 👇 ADD THIS ENVIRONMENT SECTION BELOW
        env:
        - name: DATABASE_SECRET_PASSWORD
          valueFrom:
            secretKeyRef:
              name: agronet-db-credentials
              key: DB_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: ingestion-api-service
spec:
  type: NodePort
  selector:
    app: agronet-ingestion
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 32000